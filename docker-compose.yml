# Portals Platform — docker compose configuration
# ─────────────────────────────────────────────────────────────────────────────
# Nearly 100% production parity. Every service that runs in K8s on LKE also
# runs here, same images, same env vars, same startup order, same health
# checks. Differences from prod are documented inline with [COMPOSE ONLY] tags.
#
# Usage:
#   cp .env.compose .env.compose.local  # fill in LAGO_RSA_PRIVATE_KEY etc.
#   docker compose --env-file .env.compose.local up -d
#   ./infra/compose/scripts/bootstrap.sh
#
# Service topology mirrors K8s namespace layout:
#   Tier 0 (no deps):     postgres, redis, clickhouse, kafka, minio, nats
#   Tier 1 (infra):       openmeter, lago-api, lago-front, lago-worker
#   Tier 2 (platform):    runtime-core, registry, benthos
#   Tier 3 (jobs):        billing-sync, lago-seed
#   Tier 4 (observability): prometheus, grafana
#   Tier 5 (dev tools):   stripe-cli
#
# All service names match K8s in-cluster DNS names so env vars are identical
# between compose and prod (OPENMETER_ENDPOINT, LAGO_API_URL, NATS_URL etc.)
# ─────────────────────────────────────────────────────────────────────────────

name: portals-platform

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-lago-common-env: &lago-common-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  LAGO_API_URL: ${LAGO_API_URL:-http://lago-api:3000}
  LAGO_RSA_PRIVATE_KEY: ${LAGO_RSA_PRIVATE_KEY}
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
  LAGO_FRONT_URL: http://localhost:8090

# ─────────────────────────────────────────────
# TIER 0 — Stateful foundations
# ─────────────────────────────────────────────
services:

  postgres:
    image: postgres:16-alpine
    <<: [*restart, *logging]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lago}
      POSTGRES_USER:     ${POSTGRES_USER:-lago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lago_dev_password_change_in_prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lago} -d ${POSTGRES_DB:-lago}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    # ClickHouse: long-term storage + aggregation for OpenMeter metering data
    image: clickhouse/clickhouse-server:24-alpine
    <<: [*restart, *logging]
    environment:
      CLICKHOUSE_DB:       ${CLICKHOUSE_DB:-openmeter}
      CLICKHOUSE_USER:     ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  kafka:
    # Redpanda — Kafka-compatible, single binary, no ZooKeeper.
    # [COMPOSE ONLY] prod uses a real Kafka cluster on LKE.
    # Redpanda is Kafka wire-compatible so all OpenMeter + Benthos config is identical.
    image: redpandadata/redpanda:v24.2.1
    <<: [*restart, *logging]
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:9644
      - --advertise-kafka-addr internal://kafka:9092,external://localhost:9644
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
      - --schema-registry-addr 0.0.0.0:8081
      - --rpc-addr kafka:33145
      - --advertise-rpc-addr kafka:33145
      - --mode dev-container
      - --default-log-level=warn
    volumes:
      - kafka-data:/var/lib/redpanda/data
    ports:
      - "9092:9092"   # Kafka internal
      - "9644:9644"   # Kafka external + Prometheus metrics
      - "8082:8082"   # Pandaproxy (REST)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy: true' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  nats:
    # NATS JetStream — the realtime-fanout capability pub/sub bus.
    # Also used by the Benthos bridge to fan high-throughput metering
    # events over to OpenMeter.
    image: nats:2.10-alpine
    <<: [*restart, *logging]
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--max_payload=1MB"
    volumes:
      - nats-data:/data
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # Monitoring / Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  minio:
    # MinIO — S3-compatible object storage.
    # [COMPOSE ONLY] prod uses Linode Object Storage (same S3 API, different endpoint).
    # World state and asset buckets are created by the minio-init service below.
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    <<: [*restart, *logging]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9002:9000"   # S3 API  (9000 taken by ClickHouse native)
      - "9001:9001"   # MinIO console
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    # One-shot: creates world-state and assets buckets on first run.
    image: minio/mc:RELEASE.2024-06-04T22-01-48Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing local/${S3_BUCKET_WORLD_STATE:-nap-world-state} &&
        mc mb --ignore-existing local/${S3_BUCKET_ASSETS:-nap-assets} &&
        echo '[minio-init] buckets ready'
      "
    restart: "no"

# ─────────────────────────────────────────────
# TIER 1 — Billing infrastructure
# ─────────────────────────────────────────────

  openmeter:
    # Usage metering — aggregates CloudEvents from runtime-core + Benthos bridge
    # into the 5 billable meters. Pre-configured via infra/compose/openmeter/config.yaml.
    image: ghcr.io/openmeterio/openmeter:latest
    <<: [*restart, *logging]
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      CONFIG_FILE: /etc/openmeter/config.yaml
    volumes:
      - ./infra/compose/openmeter/config.yaml:/etc/openmeter/config.yaml:ro
    ports:
      - "8888:8888"   # OpenMeter API (used by runtime-core + billing-sync)
      - "10000:10000" # Telemetry / Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/api/v1/meters || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  lago-api:
    # Lago billing engine — applies pricing plans against usage data,
    # generates invoices, pushes payment intents to Stripe.
    image: getlago/api:v1.39.0
    <<: [*restart, *logging]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *lago-common-env
      LAGO_API_KEY: ${LAGO_API_KEY:-}
      SECRET_KEY_BASE: ${LAGO_RSA_PRIVATE_KEY:-insecure-replace-in-prod}
    volumes:
      - lago-storage:/app/storage
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  lago-front:
    # Lago web UI — billing dashboard for monitoring invoices, customers, usage.
    image: getlago/front:latest
    <<: [*restart, *logging]
    depends_on:
      lago-api:
        condition: service_healthy
    environment:
      API_URL: http://lago-api:3000
    ports:
      - "8090:80"   # Lago UI at http://localhost:8090
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  lago-worker:
    # Lago background job processor (Sidekiq) — handles invoice generation,
    # webhook delivery, payment processing. Must run alongside lago-api.
    image: getlago/api:v1.39.0
    <<: [*restart, *logging]
    depends_on:
      lago-api:
        condition: service_healthy
    environment:
      <<: *lago-common-env
      LAGO_API_KEY: ${LAGO_API_KEY:-}
      SECRET_KEY_BASE: ${LAGO_RSA_PRIVATE_KEY:-insecure-replace-in-prod}
    command: ["bundle", "exec", "sidekiq"]
    volumes:
      - lago-storage:/app/storage

  lago-seed:
    # One-shot: creates billing plans defined in @nap/billing-engine/src/plans.ts.
    # Idempotent — safe to re-run. Plans already existing return 422 (treated as ok).
    image: alpine:3.20
    depends_on:
      lago-api:
        condition: service_healthy
    environment:
      LAGO_API_URL: ${LAGO_API_URL:-http://lago-api:3000}
      LAGO_API_KEY: ${LAGO_API_KEY:-}
    volumes:
      - ./infra/compose/lago/seed.sh:/seed.sh:ro
    command: ["/bin/sh", "/seed.sh"]
    restart: "no"

# ─────────────────────────────────────────────
# TIER 2 — Platform services
# ─────────────────────────────────────────────

  runtime-core:
    # Portals control plane — session orchestration + billing metering hooks.
    # In prod: K8s Deployment (infra/k8s/base/runtime-core-deployment.yaml)
    build:
      context: .
      dockerfile: docker/runtime-core/Dockerfile
      target: runtime
    <<: [*restart, *logging]
    depends_on:
      nats:
        condition: service_healthy
      openmeter:
        condition: service_healthy
      registry:
        condition: service_healthy
    environment:
      NODE_ENV:             ${NODE_ENV:-development}
      PORT:                 "8080"
      NATS_URL:             ${NATS_URL:-nats://nats:4222}
      OPENMETER_ENDPOINT:   ${OPENMETER_ENDPOINT:-http://openmeter:8888}
      S3_ENDPOINT:          ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY:        ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY:        ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_WORLD_STATE:${S3_BUCKET_WORLD_STATE:-nap-world-state}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  registry:
    # Portals capability registry — control-plane component.
    # In prod: K8s Deployment (infra/k8s/base/registry-deployment.yaml)
    build:
      context: .
      dockerfile: docker/registry/Dockerfile
      target: runtime
    <<: [*restart, *logging]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT:     "8081"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  benthos:
    # Redpanda Connect — NATS JetStream → OpenMeter bridge.
    # Routes high-throughput viewer.joined/viewer.left events from realtime-fanout
    # to OpenMeter without going through the HTTP metering client.
    # In prod: K8s Deployment (infra/k8s/base/benthos-bridge.yaml)
    build:
      context: docker/benthos
      dockerfile: Dockerfile
    <<: [*restart, *logging]
    depends_on:
      nats:
        condition: service_healthy
      openmeter:
        condition: service_healthy
    environment:
      NATS_URL:           ${NATS_URL:-nats://nats:4222}
      OPENMETER_ENDPOINT: ${OPENMETER_ENDPOINT:-http://openmeter:8888}
    ports:
      - "4195:4195"   # Benthos HTTP + Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4195/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

# ─────────────────────────────────────────────
# TIER 3 — Background jobs
# ─────────────────────────────────────────────

  billing-sync:
    # Hourly (configurable) BillingSync job — pulls OpenMeter aggregates
    # and reports to Lago for invoice generation.
    # [COMPOSE ONLY] In prod this is a K8s CronJob. Here it's a long-running
    # service with an internal interval loop — same code, different scheduler.
    build:
      context: .
      dockerfile: docker/billing-sync/Dockerfile
      target: runtime
    <<: [*restart, *logging]
    depends_on:
      openmeter:
        condition: service_healthy
      lago-api:
        condition: service_healthy
    environment:
      OPENMETER_ENDPOINT:      ${OPENMETER_ENDPOINT:-http://openmeter:8888}
      LAGO_API_URL:            ${LAGO_API_URL:-http://lago-api:3000}
      LAGO_API_KEY:            ${LAGO_API_KEY:-}
      BILLING_SYNC_INTERVAL_MS:${BILLING_SYNC_INTERVAL_MS:-300000}

# ─────────────────────────────────────────────
# TIER 4 — Observability
# ─────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    <<: [*restart, *logging]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./infra/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    <<: [*restart, *logging]
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/nap-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/compose/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"   # Grafana UI at http://localhost:3001 (3000 used by Lago)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

# ─────────────────────────────────────────────
# TIER 5 — Local dev tools
# ─────────────────────────────────────────────

  stripe-cli:
    # [COMPOSE ONLY] Stripe CLI — forwards Stripe webhooks to lago-api locally.
    # Lago needs webhook events to process payment confirmations, invoice updates, etc.
    # On first run it prints a webhook signing secret — paste it into .env.compose.local
    # as STRIPE_WEBHOOK_SECRET. The container will display it in `docker compose logs stripe-cli`.
    image: stripe/stripe-cli:latest
    <<: [*logging]
    command:
      - listen
      - --api-key=${STRIPE_SECRET_KEY:-sk_test_replace}
      - --forward-to=lago-api:3000/webhooks/stripe
      - --skip-verify
    depends_on:
      lago-api:
        condition: service_healthy
    restart: on-failure

# ─────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  clickhouse-data:
    driver: local
  kafka-data:
    driver: local
  nats-data:
    driver: local
  minio-data:
    driver: local
  lago-storage:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ─────────────────────────────────────────────
# Networks — single bridge, matches K8s flat namespace
# ─────────────────────────────────────────────

networks:
  default:
    name: portals-platform
    driver: bridge

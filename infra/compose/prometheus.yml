global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: runtime-core
    static_configs:
      - targets: [runtime-core:8080]
    metrics_path: /metrics

  - job_name: capability-registry
    static_configs:
      - targets: [registry:8081]
    metrics_path: /metrics

  - job_name: openmeter
    static_configs:
      - targets: [openmeter:10000]
    metrics_path: /metrics

  - job_name: benthos-bridge
    static_configs:
      - targets: [benthos:4195]
    metrics_path: /metrics

  - job_name: nats
    static_configs:
      - targets: [nats:8222]
    metrics_path: /metrics

  - job_name: kafka
    static_configs:
      - targets: [kafka:9644]  # Redpanda Prometheus port
    metrics_path: /metrics

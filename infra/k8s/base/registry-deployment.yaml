apiVersion: apps/v1
kind: Deployment
metadata:
  name: capability-registry
  namespace: portals-platform
  labels:
    app: capability-registry
    plane: control
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capability-registry
  template:
    metadata:
      labels:
        app: capability-registry
        plane: control
    spec:
      containers:
        - name: capability-registry
          image: REPLACE_ME/nap-registry:latest
          ports:
            - containerPort: 8081
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: capability-registry
  namespace: portals-platform
spec:
  selector:
    app: capability-registry
  ports:
    - port: 80
      targetPort: 8081

apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-core
  namespace: portals-platform
  labels:
    app: runtime-core
    plane: control
spec:
  replicas: 3
  selector:
    matchLabels:
      app: runtime-core
  template:
    metadata:
      labels:
        app: runtime-core
        plane: control
    spec:
      containers:
        - name: runtime-core
          image: REPLACE_ME/nap-runtime-core:latest # build + push via CI once Dockerfile exists
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-core
  namespace: portals-platform
spec:
  selector:
    app: runtime-core
  ports:
    - port: 80
      targetPort: 8080

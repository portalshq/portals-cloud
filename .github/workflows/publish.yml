name: Publish Packages to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to publish (or "all" for all packages)'
        required: true
        type: choice
        options:
          - all
          - '@portals/contracts'
          - '@portals/billing-metering'
          - '@portals/billing-engine'
          - '@portals/billing-marketplace'
          - '@portals/registry'
          - '@portals/resolver'
          - '@portals/runtime-core'
          - '@portals/sdk'
          - '@portals/capabilities-redirect'
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Publish @portals/contracts
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/contracts'
        run: npm run release @portals/contracts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/billing-metering
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/billing-metering'
        run: npm run release @portals/billing-metering
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/billing-engine
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/billing-engine'
        run: npm run release @portals/billing-engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/billing-marketplace
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/billing-marketplace'
        run: npm run release @portals/billing-marketplace
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/registry
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/registry'
        run: npm run release @portals/registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/resolver
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/resolver'
        run: npm run release @portals/resolver
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/runtime-core
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/runtime-core'
        run: npm run release @portals/runtime-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/sdk
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/sdk'
        run: npm run release @portals/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @portals/capabilities-redirect
        if: github.event_name == 'release' || inputs.package == 'all' || inputs.package == '@portals/capabilities-redirect'
        run: npm run release @portals/capabilities-redirect
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}


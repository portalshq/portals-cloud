name: Release Engine

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Track, Version, and Publish
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write       # Required to create Release PRs and Git tags
      pull-requests: write  # Required to open/update the Release PR
      id-token: write       # Required if using npm Trusted Publishing
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Changesets needs full git history to track changes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Lint All Packages
        run: npx turbo lint

      - name: Build All Packages
        run: npx turbo build

      - name: Test All Packages
        run: npx turbo test

      # The Changesets Action automates the PR creation, tagging, and execution
      - name: Run Changeset Engine
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run local-version-script   # Script defined in package.json below
          publish: npm run local-publish-script   # Script defined in package.json below
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

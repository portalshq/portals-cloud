version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: control-plane-postgres
    environment:
      POSTGRES_DB: portals
      POSTGRES_USER: portals_admin
      POSTGRES_PASSWORD: portals_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portals_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-plane-network

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: control-plane-elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"
    environment:
      ELASTICMQ_HOST: elasticmq
      ELASTICMQ_PORT: 9324
      ELASTICMQ_REST_PORT: 9325
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9325/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-plane-network

  redis:
    image: redis:7-alpine
    container_name: control-plane-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-plane-network

  minio:
    image: minio/minio:latest
    container_name: control-plane-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control-plane-network

  control-plane:
    build:
      context: .
      dockerfile: docker/control-plane/Dockerfile
      target: runtime
    container_name: control-plane-server
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql://portals_admin:portals_password@postgres:5432/portals
      EVENT_QUEUE_URL: http://elasticmq:9324/queue/events
      DEAD_LETTER_QUEUE_URL: http://elasticmq:9324/queue/events-dlq
      AWS_REGION: us-east-1
      RUST_LOG: debug
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_CHUNKS: repository-chunks
      S3_FORCE_PATH_STYLE: true
      S3_REGION: us-east-1
      PROVIDER_TYPE: mock
      DP_TOKEN_EXPIRY_SECS: 3600
      CORS_ALLOWED_ORIGINS: "*"
      JWT_AUTH_ENABLED: false
      IDEMPOTENCY_ENABLED: true
      METRICS_ENABLED: true
    depends_on:
      postgres:
        condition: service_healthy
      elasticmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./persistence/migrations:/app/migrations:ro
    networks:
      - control-plane-network

volumes:
  postgres_data:
  minio_data:

networks:
  control-plane-network:
    driver: bridge
